name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-policy:
    name: dependency policy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-tools-deny-v3-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-0.20.2-${{ hashFiles('Cargo.lock', 'fuzz/Cargo.lock') }}
      - name: Install pinned cargo-deny
        run: cargo install cargo-deny --locked --version 0.20.2
      - name: Enforce the RUSTSEC-2024-0436 internal remediation target
        shell: bash
        run: test "$(date -u +%F)" '<' '2026-09-16'
      - name: Enforce the RUSTSEC-2024-0436 exception expiry
        shell: bash
        run: test "$(date -u +%F)" '<' '2026-10-12'
      - name: Check fuzz lockfile freshness
        run: cargo metadata --manifest-path fuzz/Cargo.toml --locked --format-version 1 > /dev/null
      - name: Check root dependency policy
        run: cargo deny check
      - name: Check fuzz dependency policy
        run: cargo deny --manifest-path fuzz/Cargo.toml check

  test:
    name: test (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            os: ubuntu-24.04
          - platform: macos-x86_64
            os: macos-15-intel
          - platform: macos-arm64
            os: macos-14
          - platform: windows-msvc
            os: windows-2022
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-test-${{ matrix.platform }}-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-test-${{ matrix.platform }}-${{ hashFiles('rust-toolchain.toml') }}-
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes libpcap-dev
      - run: rustup component add clippy rustfmt
      - name: Test portable profile
        run: cargo test --locked --no-default-features
      - name: Test default profile
        run: cargo test --locked
      - name: Test complete profile
        run: cargo test --locked --all-features
      - name: Check release pcap-free profile
        run: >-
          cargo check --locked --release --no-default-features
          --features live,native-route,native-layer3
      - name: Clippy complete profile
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

  native-e2e:
    name: Linux native namespace E2E
    permissions:
      contents: read
    uses: ./.github/workflows/native-e2e.yml

  linux-quality:
    name: Linux quality and feature powerset
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-quality-linux-v3-${{ hashFiles('rust-toolchain.toml') }}-msrv-1.96.0-hack-0.6.45-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-quality-linux-v3-${{ hashFiles('rust-toolchain.toml') }}-msrv-1.96.0-
      - run: sudo apt-get update && sudo apt-get install --yes libpcap-dev
      - run: rustup toolchain install 1.96.0 --profile minimal
      - run: rustup component add rustfmt
      - run: cargo install cargo-hack --locked --version 0.6.45
      - name: Minimum supported Rust 1.96 portable profile
        run: cargo +1.96.0 check --locked --all-targets --no-default-features
      - name: Minimum supported Rust 1.96 complete profile
        run: cargo +1.96.0 check --locked --all-targets --all-features
      - name: Formatting
        run: cargo fmt --all -- --check
      - name: Warning-free documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --locked --all-features --no-deps
      - name: Pairwise feature powerset
        run: cargo hack check --locked --feature-powerset --depth 2 --all-targets
      - name: Complete feature profile
        run: cargo check --locked --all-targets --all-features

  public-api:
    name: public Rust API compatibility (report only)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-public-api-linux-v1-${{ hashFiles('rust-toolchain.toml') }}-semver-checks-0.49.0-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-public-api-linux-v1-${{ hashFiles('rust-toolchain.toml') }}-semver-checks-0.49.0-
      - run: sudo apt-get update && sudo apt-get install --yes libpcap-dev
      - name: Install pinned cargo-semver-checks
        run: cargo install cargo-semver-checks --locked --version 0.49.0
      - name: Generate report against the latest reachable release
        id: semver
        shell: bash
        env:
          REPORT_DIRECTORY: ${{ runner.temp }}/public-api-compatibility
        run: |
          set +e
          scripts/public-api-diff "$REPORT_DIRECTORY"
          status=$?
          set -e

          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [[ "$status" -eq 100 ]]; then
            echo "::warning::Breaking public Rust API changes were reported; review the public-api-compatibility artifact."
          fi
          {
            echo "### Public Rust API compatibility"
            echo
            if [[ -f "$REPORT_DIRECTORY/baseline.txt" ]]; then
              cat "$REPORT_DIRECTORY/baseline.txt"
            else
              echo "Baseline metadata was not generated."
            fi
            echo
            case "$status" in
              0)
                echo "No breaking public API changes were reported."
                ;;
              100)
                echo "Breaking changes were reported. Under the current pre-1.0 policy, this completed comparison is report-only."
                ;;
              *)
                echo "The comparison did not complete (exit $status); this is an infrastructure or tool failure."
                ;;
            esac
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$status" -eq 0 || "$status" -eq 100 ]]; then
            exit 0
          fi
          exit "$status"
      - name: Upload public API compatibility report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: public-api-compatibility
          path: ${{ runner.temp }}/public-api-compatibility
          if-no-files-found: warn
          retention-days: 7

  portable-targets:
    name: portable target (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-freebsd
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-portable-${{ matrix.target }}-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('Cargo.lock') }}
      - run: rustup target add ${{ matrix.target }}
      - name: Check portable interface-enumeration profile
        run: >-
          cargo check --locked --target ${{ matrix.target }}
          --no-default-features --features live
      - name: Check complete portable profile
        run: cargo check --locked --target ${{ matrix.target }} --all-features --all-targets

  coverage:
    name: Linux line coverage
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/llvm-cov-target
          key: cargo-coverage-linux-v3-${{ hashFiles('rust-toolchain.toml') }}-llvm-cov-0.8.7-${{ hashFiles('Cargo.lock') }}
      - run: sudo apt-get update && sudo apt-get install --yes libpcap-dev
      - run: rustup component add llvm-tools-preview
      - run: cargo install cargo-llvm-cov --locked --version 0.8.7
      - name: Enforce 75% line coverage
        run: cargo llvm-cov --locked --all-features --workspace --lcov --output-path lcov.info --fail-under-lines 75
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-lcov
          path: lcov.info
          retention-days: 3

  fuzz-smoke:
    name: fuzz smoke (${{ matrix.target }})
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: capture_reader
            max_len: 131072
          - target: decode_roundtrip
            max_len: 65537
          - target: packet_inputs
            max_len: 65537
          - target: dns_wire
            max_len: 65538
          - target: reassembly_state
            max_len: 4096
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            fuzz/target
          key: cargo-fuzz-linux-v2-nightly-2026-07-11-0.13.2-${{ hashFiles('Cargo.lock', 'fuzz/Cargo.lock') }}
      - run: sudo apt-get update && sudo apt-get install --yes libpcap-dev
      - run: rustup toolchain install nightly-2026-07-11 --profile minimal
      - run: cargo install cargo-fuzz --locked --version 0.13.2
      - name: Run fixed deterministic budget
        run: >-
          cargo +nightly-2026-07-11 fuzz run ${{ matrix.target }}
          fuzz/corpus/${{ matrix.target }}
          -- -runs=1000 -seed=12648430 -timeout=5 -rss_limit_mb=2048
          -max_len=${{ matrix.max_len }}
          -dict=fuzz/dictionaries/${{ matrix.target }}.dict
