[graph]
all-features = true
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]

[advisories]
yanked = "deny"
unmaintained = "all"
unsound = "all"
ignore = [
    { id = "RUSTSEC-2024-0436", reason = "paste 1.0.15 is an unmaintained build-time transitive dependency of rtnetlink/netlink-packet-core; exact lockfile exception expires 2026-10-12" },
]

[licenses]
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "AGPL-3.0-only",
    "ISC",
    "MIT",
    "NCSA",
    "Unicode-3.0",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "simplest-path"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
