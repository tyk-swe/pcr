name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: sudo apt-get update && sudo apt-get install --yes libpcap-dev
      - name: Match tag and package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          test "v${version}" = "${GITHUB_REF_NAME}"
      - run: cargo test --locked --all-features
      - run: cargo package --locked

  archive:
    name: Archive (${{ matrix.target }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            shell: bash
            binary: target/x86_64-unknown-linux-gnu/release/packetcraftr
            extension: tar.gz
          - target: x86_64-apple-darwin
            os: macos-15-intel
            shell: bash
            binary: target/x86_64-apple-darwin/release/packetcraftr
            extension: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            shell: bash
            binary: target/aarch64-apple-darwin/release/packetcraftr
            extension: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            shell: pwsh
            binary: target/x86_64-pc-windows-msvc/release/packetcraftr.exe
            extension: zip
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes libpcap-dev
      - run: rustup target add ${{ matrix.target }}
      - name: Build full-native release binary
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Install pinned CycloneDX generator
        run: cargo install cargo-cyclonedx --locked --version 0.5.9
      - name: Generate target-specific CycloneDX SBOM
        run: cargo cyclonedx --format json --target ${{ matrix.target }} --all-features --override-filename bom
      - name: Resolve version
        id: version
        shell: bash
        run: echo "value=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')" >> "$GITHUB_OUTPUT"
      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/package-release.sh '${{ steps.version.outputs.value }}' '${{ matrix.target }}' '${{ matrix.binary }}' bom.json
      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package-release.ps1 -Version '${{ steps.version.outputs.value }}' -Target '${{ matrix.target }}' -Binary '${{ matrix.binary }}' -Sbom bom.json
      - name: Attest release archive build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*.${{ matrix.extension }}
      - name: Attest archive SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: dist/*.${{ matrix.extension }}
          sbom-path: bom.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.${{ matrix.extension }}
            dist/*.${{ matrix.extension }}.sha256
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Approval-gated publication
    needs: archive
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Authenticate to crates.io with GitHub OIDC
        id: crates
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
      - name: Publish crate
        run: cargo publish --locked --token '${{ steps.crates.outputs.token }}'
      - name: Publish immutable GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          draft: false
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            dist/*
