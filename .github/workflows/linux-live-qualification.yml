name: Linux live qualification

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub prerelease/candidate tag to download
        required: true
        default: v0.2.0
        type: string
      expected_commit:
        description: Full source commit embedded in the candidate archive
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: linux-live-qualification
  cancel-in-progress: false

jobs:
  qualify:
    name: Privileged Linux network namespaces
    runs-on: [self-hosted, Linux, X64, packetcraftr-live]
    environment: privileged-release-qualification
    timeout-minutes: 45
    steps:
      - name: Check out reviewed qualification tooling
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.expected_commit }}
          fetch-depth: 0

      - name: Install the stable MSRV
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Confirm the dedicated runner boundary
        shell: bash
        run: |
          set -euo pipefail
          test "$(uname -s)" = Linux
          test "$(uname -m)" = x86_64
          sudo -n true
          for command in cargo ethtool ip python3 setpriv sha256sum tar tcpdump; do
            command -v "${command}"
          done
          ldconfig -p | grep 'libpcap\.so'

      - name: Download the immutable GitHub Release inputs
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/candidate"
          gh release download "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern 'packetcraftr-workspace-*.tar.gz' \
            --pattern SHA256SUMS \
            --dir "${RUNNER_TEMP}/candidate"
          (cd "${RUNNER_TEMP}/candidate" && sha256sum --check SHA256SUMS)

      - name: Run the privileged live matrix
        env:
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t archives < <(find "${RUNNER_TEMP}/candidate" -maxdepth 1 \
            -name 'packetcraftr-workspace-*.tar.gz' -type f -print)
          test "${#archives[@]}" = 1
          scripts/qualify-linux-live.sh \
            --archive "${archives[0]}" \
            --checksums "${RUNNER_TEMP}/candidate/SHA256SUMS" \
            --expected-commit "${EXPECTED_COMMIT}" \
            --evidence "${RUNNER_TEMP}/linux-live-evidence" \
            --bundle "${RUNNER_TEMP}/linux-live-evidence.tar.gz"

      - name: Archive sanitized release-signoff evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-live-${{ inputs.release_tag }}-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/linux-live-evidence
            ${{ runner.temp }}/linux-live-evidence.tar.gz
          if-no-files-found: error
          retention-days: 90
