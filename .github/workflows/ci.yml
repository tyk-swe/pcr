name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"

jobs:
  format:
    name: Rustfmt
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install 1.96.0 --profile minimal --component rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  linux:
    name: Linux / ${{ matrix.profile.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        profile:
          - name: default features
            flags: ""
          - name: no default features
            flags: --no-default-features
          - name: all features
            flags: --all-features
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install 1.96.0 --profile minimal --component clippy
      - name: Install libpcap
        if: matrix.profile.flags == '--all-features'
        run: sudo apt-get update && sudo apt-get install --yes libpcap-dev
      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets ${{ matrix.profile.flags }} -- -D warnings
      - name: Test
        run: cargo test --locked --workspace --all-targets ${{ matrix.profile.flags }}
      - name: Test documentation examples
        run: cargo test --locked --workspace --doc ${{ matrix.profile.flags }}
      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --locked --workspace --no-deps ${{ matrix.profile.flags }}

  schemas:
    name: Schemas and examples
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install schema validator
        run: python -m pip install --disable-pip-version-check -r scripts/requirements.txt
      - name: Validate schemas and examples
        run: bash scripts/check-schemas.sh
      - name: Validate fixture paths and hashes
        run: python3 scripts/validate-fixture-corpus.py

  documentation:
    name: CLI documentation examples
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install 1.96.0 --profile minimal
      - name: Build the portable CLI
        run: cargo build --locked --no-default-features
      - name: Execute documented workflows
        run: python3 scripts/check-documentation-examples.py

  dependencies:
    name: Dependency, license, and source policy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: "1.96.0"
          command: check advisories bans licenses sources
          arguments: --all-features

  architecture:
    name: Component and native boundary policy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install 1.96.0 --profile minimal
      - name: Enforce architecture policy
        run: bash scripts/check-architecture.sh

  contracts:
    name: Public API and CLI contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install 1.96.0 --profile minimal
      - name: Build public documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --locked --workspace --no-deps
      - name: Compare the public API baseline
        run: python3 scripts/check-public-api.py
      - name: Build the portable CLI
        run: cargo build --locked --no-default-features
      - name: Compare CLI goldens and schemas
        run: python3 scripts/check-cli-contract.py

  rustsec:
    name: RustSec advisory audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  fixtures:
    name: Fixture provenance
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require reviewed provenance sidecars
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: bash scripts/check-fixture-changes.sh
      - name: Test fixture policy
        run: python3 scripts/test-fixture-policy.py

  platforms:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS / default features
            os: macos-14
            flags: ""
          - name: macOS / no default features
            os: macos-14
            flags: --no-default-features
          - name: macOS / all features
            os: macos-14
            flags: --all-features
          - name: Windows / default features
            os: windows-2022
            flags: ""
          - name: Windows / no default features
            os: windows-2022
            flags: --no-default-features
          - name: Windows / all features
            os: windows-2022
            flags: --all-features
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install 1.96.0 --profile minimal
      - name: Compile
        run: cargo check --locked --workspace --all-targets ${{ matrix.flags }}
      - name: Test
        run: cargo test --locked --workspace --all-targets ${{ matrix.flags }}
      - name: Check portable Windows dependencies
        if: runner.os == 'Windows' && matrix.flags != '--all-features'
        shell: pwsh
        run: |
          $tree = cargo tree --color never --locked --target x86_64-pc-windows-msvc --edges normal ${{ matrix.flags }} --prefix none --format '{p}'
          $native = $tree | Select-String -Pattern '^(?:libloading |pnet(?:_| )|socket2 |windows )'
          if ($native) {
            $native | ForEach-Object { Write-Error $_ }
            throw 'portable Windows profiles resolved native adapter dependencies'
          }
      - name: Check native Windows dependencies
        if: runner.os == 'Windows' && matrix.flags == '--all-features'
        shell: pwsh
        run: |
          $tree = cargo tree --color never --locked --target x86_64-pc-windows-msvc --edges normal --all-features --prefix none --format '{p}'
          $linkedPacketLibrary = $tree | Select-String -Pattern '^(?:pcap |pnet(?:_| ))'
          if ($linkedPacketLibrary) {
            $linkedPacketLibrary | ForEach-Object { Write-Error $_ }
            throw 'Windows native adapters must not statically link pcap, pnet, or Packet.lib'
          }
          foreach ($dependency in @('windows ', 'libloading ', 'socket2 ')) {
            if (-not ($tree | Select-String -Pattern "^$dependency")) {
              throw "Windows all-feature profile is missing $dependency"
            }
          }

  required:
    name: Required checks
    if: always()
    needs:
      - format
      - linux
      - schemas
      - documentation
      - dependencies
      - architecture
      - contracts
      - rustsec
      - fixtures
      - platforms
    runs-on: ubuntu-24.04
    steps:
      - name: Confirm all required jobs passed
        run: |
          test "${{ needs.format.result }}" = success
          test "${{ needs.linux.result }}" = success
          test "${{ needs.schemas.result }}" = success
          test "${{ needs.documentation.result }}" = success
          test "${{ needs.dependencies.result }}" = success
          test "${{ needs.architecture.result }}" = success
          test "${{ needs.contracts.result }}" = success
          test "${{ needs.rustsec.result }}" = success
          test "${{ needs.fixtures.result }}" = success
          test "${{ needs.platforms.result }}" = success
