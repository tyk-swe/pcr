name: Privileged Linux qualification

on:
  pull_request:
  schedule:
    - cron: "41 3 * * *"
  workflow_dispatch:

concurrency:
  group: native-linux-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  namespace:
    name: network namespace and veth
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: >-
          sudo apt-get update && sudo apt-get install --yes
          dnsmasq ethtool iproute2 iputils-ping jq libpcap-dev socat
      - run: cargo build --release --locked
      - name: Run isolated privileged qualification
        run: sudo --preserve-env=RUST_BACKTRACE bash scripts/native-netns.sh "$PWD/target/release/packetcraftr"
