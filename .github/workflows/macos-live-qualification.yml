name: macOS live qualification

on:
  push:
    paths:
      - .github/workflows/macos-live-qualification.yml
      - scripts/qualify-macos-live.sh
      - scripts/verify-macos-live-evidence.py
      - scripts/linux-live-peer.py
  workflow_dispatch:
    inputs:
      expected_commit:
        description: Full approved candidate commit to package and qualify
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: macos-live-qualification
  cancel-in-progress: false

jobs:
  qualify:
    name: ${{ matrix.name }} feth/BPF/raw sockets
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            runner: macos-15
            architecture: arm64
          - name: macOS x86_64
            runner: macos-15-intel
            architecture: x86_64
    steps:
      - name: Check out the exact approved candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.expected_commit || github.sha }}
          fetch-depth: 0

      - name: Install the stable MSRV
        uses: dtolnay/rust-toolchain@1.96.0

      - name: Confirm the live runner boundary
        shell: bash
        env:
          EXPECTED_ARCHITECTURE: ${{ matrix.architecture }}
        run: |
          set -euo pipefail
          test "$(uname -s)" = Darwin
          test "$(uname -m)" = "${EXPECTED_ARCHITECTURE}"
          sudo -n true
          for command in cargo ifconfig python3 route shasum tcpdump; do
            command -v "${command}"
          done

      - name: Build deterministic approved-candidate inputs
        shell: bash
        env:
          RELEASE_TREE: ${{ inputs.expected_commit || github.sha }}
        run: bash scripts/build-release-inputs.sh "${RUNNER_TEMP}/candidate"

      - name: Run real route, BPF, and raw-socket qualification
        shell: bash
        env:
          EXPECTED_ARCHITECTURE: ${{ matrix.architecture }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit || github.sha }}
        run: |
          set -euo pipefail
          archive="$(find "${RUNNER_TEMP}/candidate" -maxdepth 1 \
            -name 'packetcraftr-workspace-*.tar.gz' -type f -print)"
          test -n "${archive}"
          bash scripts/qualify-macos-live.sh \
            --archive "${archive}" \
            --checksums "${RUNNER_TEMP}/candidate/SHA256SUMS" \
            --expected-architecture "${EXPECTED_ARCHITECTURE}" \
            --expected-commit "${EXPECTED_COMMIT}" \
            --evidence "${RUNNER_TEMP}/macos-live-evidence" \
            --bundle "${RUNNER_TEMP}/macos-live-evidence.tar.gz"

      - name: Retain sanitized release-signoff evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-live-${{ matrix.architecture }}-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/macos-live-evidence
            ${{ runner.temp }}/macos-live-evidence.tar.gz
          if-no-files-found: error
          retention-days: 90
