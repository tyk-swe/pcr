name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub prerelease tag to download and smoke-test
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"

jobs:
  format:
    name: Rustfmt
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install the pinned Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --component rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  linux-feature-matrix:
    name: Linux / ${{ matrix.profile.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        profile:
          - name: default features
            flags: ""
          - name: no default features
            flags: --no-default-features
          - name: all features
            flags: --all-features
    steps:
      - uses: actions/checkout@v4
      - name: Install the pinned Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --component clippy
      - name: Install libpcap development files
        if: matrix.profile.flags == '--all-features'
        run: sudo apt-get update && sudo apt-get install --yes libpcap-dev
      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets ${{ matrix.profile.flags }} -- -D warnings
      - name: Test
        run: cargo test --locked --workspace --all-targets ${{ matrix.profile.flags }}
      - name: Test public documentation examples
        run: cargo test --locked --workspace --doc ${{ matrix.profile.flags }}
      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --locked --workspace --no-deps ${{ matrix.profile.flags }}

  package:
    name: Portable beta gate and Release inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install the pinned Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --component clippy,rustfmt
      - name: Install pinned beta-gate tools
        run: |
          python -m pip install --disable-pip-version-check -r scripts/beta-gate-requirements.txt
          cargo install cargo-deny --version 0.19.7 --locked
      - name: Fetch locked Rust dependencies before the offline gate
        run: cargo fetch --locked
      - name: Run the reproducible portable beta gate
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA: ${{ github.sha }}
          PACKETCRAFTR_OFFLINE_AFTER_POLICY: "1"
          PACKETCRAFTR_RELEASE_OUTPUT_DIR: ${{ runner.temp }}/packetcraftr-release-inputs
          # Ordinary post-beta pushes keep reproducing the immutable published
          # checkpoint; a manual release validation may select a later tag.
          RELEASE_TREE: ${{ inputs.release_tag || 'v0.2.0-beta.1' }}
        run: bash scripts/check-beta-gate.sh
      - name: List verified deterministic Release inputs
        run: |
          cd "${RUNNER_TEMP}/packetcraftr-release-inputs"
          sha256sum --check SHA256SUMS
          find . -maxdepth 1 -type f -printf '%f\n' | sort

  schemas:
    name: JSON schemas and examples
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install schema validator
        run: python -m pip install --disable-pip-version-check -r scripts/beta-gate-requirements.txt
      - name: Validate schemas, examples, and negative fixtures
        run: bash scripts/check-schemas.sh
      - name: Verify fixture paths and hashes
        run: python3 scripts/validate-fixture-corpus.py

  documentation_examples:
    name: Documentation and CLI examples
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install the pinned Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal
      - name: Build the portable frozen CLI
        run: cargo build --locked --no-default-features
      - name: Execute all documented command workflows
        run: python3 scripts/check-documentation-examples.py

  dependency-policy:
    name: Dependency, license, and source policy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: "1.96.0"
          command: check advisories bans licenses sources
          arguments: --all-features

  architecture-policy:
    name: Component and native boundary policy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install the pinned Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal
      - name: Enforce component, native dependency, and unsafe ownership
        run: bash scripts/check-architecture.sh

  public-api:
    name: Public Rust API baseline
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install the pinned Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal
      - name: Build warning-free public documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --locked --workspace --no-deps
      - name: Compare the beta façade baseline
        run: python3 scripts/check-public-api.py
      - name: Build the portable frozen CLI
        run: cargo build --locked --no-default-features
      - name: Compare CLI help, parse-error, and schema baselines
        run: python3 scripts/check-cli-contract.py

  rustsec:
    name: RustSec advisory audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  fixtures:
    name: Fixture provenance changes
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require reviewed provenance sidecars
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: bash scripts/check-fixture-changes.sh
      - name: Exercise fixture policy regressions
        run: python3 scripts/test-fixture-policy.py

  portable-platforms:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS / default features
            os: macos-14
            flags: ""
          - name: macOS / no default features
            os: macos-14
            flags: --no-default-features
          - name: macOS / all features
            os: macos-14
            flags: --all-features
          - name: Windows / default features (portable)
            os: windows-2022
            flags: ""
          - name: Windows / no default features (portable)
            os: windows-2022
            flags: --no-default-features
          - name: Windows / all features (native route + Npcap + raw IP)
            os: windows-2022
            flags: --all-features
    steps:
      - uses: actions/checkout@v4
      - name: Install the pinned Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal
      - name: Compile target profile
        run: cargo check --locked --workspace --all-targets ${{ matrix.flags }}
      - name: Test target profile
        run: cargo test --locked --workspace --all-targets ${{ matrix.flags }}
      - name: Assert the portable Windows dependency boundary
        if: runner.os == 'Windows' && matrix.flags != '--all-features'
        shell: pwsh
        run: |
          $tree = cargo tree --color never --locked --target x86_64-pc-windows-msvc --edges normal ${{ matrix.flags }} --prefix none --format '{p}'
          $nativeDependencies = $tree | Select-String -Pattern '^(?:libloading |pnet(?:_| )|socket2 |windows )'
          if ($nativeDependencies) {
            $nativeDependencies | ForEach-Object { Write-Error $_ }
            throw 'portable Windows profiles must not resolve pnet, libloading, socket2, or the Windows native adapter'
          }
      - name: Assert the native Windows dependency boundary
        if: runner.os == 'Windows' && matrix.flags == '--all-features'
        shell: pwsh
        run: |
          $tree = cargo tree --color never --locked --target x86_64-pc-windows-msvc --edges normal --all-features --prefix none --format '{p}'
          $packetLibraryBoundary = $tree | Select-String -Pattern '^(?:pcap |pnet(?:_| ))'
          if ($packetLibraryBoundary) {
            $packetLibraryBoundary | ForEach-Object { Write-Error $_ }
            throw 'Windows native adapters must not statically link pcap, pnet, or Packet.lib'
          }
          $windowsBindings = $tree | Select-String -Pattern '^windows '
          if (-not $windowsBindings) {
            throw 'the Windows all-feature profile must resolve the native IP Helper bindings'
          }
          $runtimeLoader = $tree | Select-String -Pattern '^libloading '
          if (-not $runtimeLoader) {
            throw 'the Windows all-feature profile must resolve the Npcap runtime loader'
          }
          $rawSocket = $tree | Select-String -Pattern '^socket2 '
          if (-not $rawSocket) {
            throw 'the Windows all-feature profile must resolve the raw IP socket adapter'
          }

  release-smoke:
    name: Release artifact / ${{ matrix.name }}
    if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
          - name: macOS
            os: macos-14
          - name: Windows
            os: windows-2022
    steps:
      - name: Install the beta MSRV
        shell: bash
        run: rustup toolchain install 1.96.0 --profile minimal
      - name: Download and authenticate GitHub prerelease assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$ ]]; then
            echo "release_tag must be a canonical v-prefixed SemVer tag" >&2
            exit 2
          fi

          download="${RUNNER_TEMP}/packetcraftr-release-download"
          archive="packetcraftr-workspace-${version}.tar.gz"
          mkdir -p "${download}"

          state="$(gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --json tagName,isDraft,isPrerelease --jq '[.tagName, .isDraft, .isPrerelease] | @tsv')"
          IFS=$'\t' read -r actual_tag is_draft is_prerelease <<<"${state}"
          if [[ "${actual_tag}" != "${RELEASE_TAG}" || "${is_draft}" != "false" || "${is_prerelease}" != "true" ]]; then
            echo "selected GitHub Release is not the expected published prerelease" >&2
            exit 1
          fi

          assets="$(gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name' | sort)"
          expected_assets="$(printf '%s\n' SHA256SUMS "${archive}" | sort)"
          if [[ "${assets}" != "${expected_assets}" ]]; then
            echo "GitHub prerelease asset set differs" >&2
            printf 'expected:\n%s\nactual:\n%s\n' "${expected_assets}" "${assets}" >&2
            exit 1
          fi

          object_type="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" --jq '.object.type')"
          source_commit="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" --jq '.object.sha')"
          while [[ "${object_type}" == "tag" ]]; do
            object_type="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${source_commit}" --jq '.object.type')"
            source_commit="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${source_commit}" --jq '.object.sha')"
          done
          if [[ "${object_type}" != "commit" || ! "${source_commit}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "release tag does not resolve to a commit" >&2
            exit 1
          fi

          gh release download "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir "${download}" \
            --pattern SHA256SUMS \
            --pattern "${archive}"

          python - "${download}" "${archive}" <<'PY'
          import hashlib
          import pathlib
          import sys

          directory = pathlib.Path(sys.argv[1])
          archive_name = sys.argv[2]
          lines = [line for line in (directory / "SHA256SUMS").read_text(encoding="utf-8").splitlines() if line]
          if len(lines) != 1:
              raise SystemExit("SHA256SUMS must contain exactly one distributable")
          digest, separator, name = lines[0].partition("  ")
          if separator != "  " or name != archive_name or len(digest) != 64:
              raise SystemExit("SHA256SUMS does not name the selected archive exactly")
          actual = hashlib.sha256((directory / archive_name).read_bytes()).hexdigest()
          if actual != digest:
              raise SystemExit(f"archive checksum mismatch: expected {digest}, actual {actual}")
          print(f"verified {archive_name} ({actual})")
          PY

          (
            cd "${download}"
            tar --extract --gzip --file "${archive}"
          )
          workspace="${download}/packetcraftr-workspace-${version}"
          if [[ ! -d "${workspace}" ]]; then
            echo "workspace archive has the wrong top-level directory" >&2
            exit 1
          fi

          {
            echo "RELEASE_VERSION=${version}"
            echo "RELEASE_TAG=${RELEASE_TAG}"
            echo "RELEASE_COMMIT=${source_commit}"
            echo "RELEASE_WORKSPACE=${workspace}"
            echo "RELEASE_INSTALL_ROOT=${RUNNER_TEMP}/packetcraftr-release-install"
          } >>"${GITHUB_ENV}"
      - name: Verify embedded source and package metadata
        shell: bash
        run: >-
          python "${RELEASE_WORKSPACE}/scripts/check-release-metadata.py"
          --workspace "${RELEASE_WORKSPACE}"
          --expected-version "${RELEASE_VERSION}"
          --expected-tag "${RELEASE_TAG}"
          --expected-commit "${RELEASE_COMMIT}"
      - name: Install the portable CLI from the downloaded archive
        shell: bash
        run: >-
          cargo install --locked
          --path "${RELEASE_WORKSPACE}"
          --no-default-features
          --root "${RELEASE_INSTALL_ROOT}"
      - name: Smoke-test version and frozen CLI workflows
        shell: bash
        run: |
          set -euo pipefail
          binary="${RELEASE_INSTALL_ROOT}/bin/packetcraftr"
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            binary="${binary}.exe"
          fi
          version_output="$("${binary}" --version)"
          if [[ "${version_output}" != "packetcraftr ${RELEASE_VERSION}" ]]; then
            echo "installed version differs: ${version_output}" >&2
            exit 1
          fi
          python "${RELEASE_WORKSPACE}/scripts/check-cli-contract.py" --binary "${binary}"
          python "${RELEASE_WORKSPACE}/scripts/check-documentation-examples.py" --binary "${binary}"

  release-smoke-required:
    name: Release artifact checks
    if: always() && github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
    needs: release-smoke
    runs-on: ubuntu-24.04
    steps:
      - name: Confirm every downloaded-artifact smoke job passed
        run: test "${{ needs.release-smoke.result }}" = "success"

  required:
    name: Required checks
    if: always()
    needs:
      - format
      - linux-feature-matrix
      - package
      - portable-platforms
      - schemas
      - documentation_examples
      - dependency-policy
      - architecture-policy
      - public-api
      - rustsec
      - fixtures
    runs-on: ubuntu-24.04
    steps:
      - name: Confirm all required jobs passed
        run: |
          test "${{ needs.format.result }}" = "success"
          test "${{ needs.linux-feature-matrix.result }}" = "success"
          test "${{ needs.package.result }}" = "success"
          test "${{ needs.portable-platforms.result }}" = "success"
          test "${{ needs.schemas.result }}" = "success"
          test "${{ needs.documentation_examples.result }}" = "success"
          test "${{ needs.dependency-policy.result }}" = "success"
          test "${{ needs.architecture-policy.result }}" = "success"
          test "${{ needs.public-api.result }}" = "success"
          test "${{ needs.rustsec.result }}" = "success"
          test "${{ needs.fixtures.result }}" = "success"
