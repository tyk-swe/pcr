[graph]
all-features = true

[advisories]
# rtnetlink 0.21.0 -> netlink-packet-core 0.8.1 uses the archived `paste`
# procedural macro. RUSTSEC-2024-0436 is an unmaintained notice rather than a
# vulnerability, and the advisory currently offers no safe upgrade. Keep this
# exception pinned to the advisory while continuing to deny vulnerabilities.
ignore = ["RUSTSEC-2024-0436"]

[licenses]
allow = [
    "AGPL-3.0-only",
    "Apache-2.0",
    "BSL-1.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
]
confidence-threshold = 0.8

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
