name: Nightly fuzz

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-fuzz-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz:
    name: campaign (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: capture_reader
            max_len: 131072
          - target: decode_roundtrip
            max_len: 65537
          - target: packet_inputs
            max_len: 65537
          - target: dns_wire
            max_len: 65538
          - target: reassembly_state
            max_len: 4096
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Cargo tools and fuzz builds
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            fuzz/target
          key: nightly-fuzz-build-v3-${{ matrix.target }}-nightly-2026-07-11-0.13.2-${{ hashFiles('Cargo.lock', 'fuzz/Cargo.lock') }}
          restore-keys: nightly-fuzz-build-v3-${{ matrix.target }}-
      - name: Cache evolving fuzz corpus
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: nightly-fuzz-corpus-v3-${{ matrix.target }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: nightly-fuzz-corpus-v3-${{ matrix.target }}-
      - run: sudo apt-get update && sudo apt-get install --yes libpcap-dev
      - run: rustup toolchain install nightly-2026-07-11 --profile minimal
      - run: cargo install cargo-fuzz --locked --version 0.13.2
      - name: Fuzz for ten minutes
        run: >-
          cargo +nightly-2026-07-11 fuzz run ${{ matrix.target }}
          fuzz/corpus/${{ matrix.target }}
          -- -max_total_time=600 -timeout=5 -rss_limit_mb=2048
          -max_len=${{ matrix.max_len }}
          -dict=fuzz/dictionaries/${{ matrix.target }}.dict
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}
          if-no-files-found: warn
          retention-days: 7
