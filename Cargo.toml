[workspace]
members = ["."]
resolver = "2"

[workspace.package]
version = "0.2.0-alpha.1"

[workspace.lints.rust]
unsafe_code = "deny"

[workspace.metadata.packetcraftr]
components = ["core", "protocols", "io", "session", "tools", "facade"]
publish-order = ["packetcraftr-core", "packetcraftr-protocols", "packetcraftr-io", "packetcraftr-session", "packetcraftr-tools", "packetcraftr"]
native-dependency-owner = "packetcraftr-io::platform"
unsafe-owner = "packetcraftr-io::platform"

[workspace.metadata.packetcraftr.native-wrappers]
linux-route = "rtnetlink"
layer2-capture-injection = "pcap"
macos-route-and-raw-sockets = "socket2"
windows-network-apis = "windows"

[package]
name = "packetcraftr"
version.workspace = true
edition = "2021"
rust-version = "1.96"
license = "AGPL-3.0-only"
authors = ["tyk-swe"]
description = "Modular packet crafting, transmission, and automation toolkit"
readme = "README.md"
repository = "https://github.com/tyk-swe/pcr"
homepage = "https://github.com/tyk-swe/pcr"
documentation = "https://docs.rs/packetcraftr"
keywords = ["packet", "network", "cli", "testing"]
categories = ["command-line-utilities", "network-programming"]

[lints]
workspace = true

[[bin]]
name = "packetcraftr"
path = "src/main.rs"

[features]
default = ["live"]
live = ["dep:pnet"]

[dependencies]
bytes = { version = "1", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
noyalib = { version = "0.0.5", features = ["compat-serde-yaml"] }

[target.'cfg(not(windows))'.dependencies]
pnet = { version = "0.35", default-features = false, features = ["std"], optional = true }
