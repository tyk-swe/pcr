name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"

jobs:
  format:
    name: Rustfmt
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install the pinned Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --component rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  linux-feature-matrix:
    name: Linux / ${{ matrix.profile.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        profile:
          - name: default features
            flags: ""
          - name: no default features
            flags: --no-default-features
          - name: all features
            flags: --all-features
    steps:
      - uses: actions/checkout@v4
      - name: Install the pinned Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --component clippy
      - name: Install libpcap development files
        if: matrix.profile.flags == '--all-features'
        run: sudo apt-get update && sudo apt-get install --yes libpcap-dev
      - name: Clippy
        run: cargo clippy --locked --all-targets ${{ matrix.profile.flags }} -- -D warnings
      - name: Test
        run: cargo test --locked --all-targets ${{ matrix.profile.flags }}
      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --locked --no-deps ${{ matrix.profile.flags }}

  package:
    name: Package
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install the pinned Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal
      - name: Verify the publishable crate
        run: cargo package --locked
      - name: Verify a clean CLI install
        run: |
          cargo install --locked --path . --root "${RUNNER_TEMP}/packetcraftr-install"
          "${RUNNER_TEMP}/packetcraftr-install/bin/packetcraftr" --version

  schemas:
    name: JSON schemas and examples
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install schema validator
        run: python -m pip install --disable-pip-version-check check-jsonschema
      - name: Validate packet documents
        run: >-
          check-jsonschema
          --schemafile schemas/packetcraftr.packet.v1.schema.json
          examples/documents/packet-*.json
      - name: Validate output documents
        run: >-
          check-jsonschema
          --schemafile schemas/packetcraftr.output.v1.schema.json
          examples/documents/output-*.json

  dependency-policy:
    name: Dependency, license, and source policy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: "1.96.0"
          command: check advisories bans licenses sources
          arguments: --all-features

  architecture-policy:
    name: Component and native boundary policy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install the pinned Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal
      - name: Enforce component, native dependency, and unsafe ownership
        run: bash scripts/check-architecture.sh

  rustsec:
    name: RustSec advisory audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  fixtures:
    name: Fixture provenance changes
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require reviewed provenance sidecars
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash scripts/check-fixture-changes.sh

  portable-platforms:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS / default features
            os: macos-14
            flags: ""
          - name: macOS / no default features
            os: macos-14
            flags: --no-default-features
          - name: macOS / all features
            os: macos-14
            flags: --all-features
          - name: Windows / default features (portable)
            os: windows-2022
            flags: ""
          - name: Windows / no default features (portable)
            os: windows-2022
            flags: --no-default-features
          - name: Windows / all features (native route + Npcap ABI)
            os: windows-2022
            flags: --all-features
    steps:
      - uses: actions/checkout@v4
      - name: Install the pinned Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal
      - name: Compile target profile
        run: cargo check --locked --all-targets ${{ matrix.flags }}
      - name: Test target profile
        run: cargo test --locked --all-targets ${{ matrix.flags }}
      - name: Assert the portable Windows dependency boundary
        if: runner.os == 'Windows' && matrix.flags != '--all-features'
        shell: pwsh
        run: |
          $tree = cargo tree --color never --locked --target x86_64-pc-windows-msvc --edges normal ${{ matrix.flags }} --prefix none --format '{p}'
          $nativeDependencies = $tree | Select-String -Pattern '^(?:libloading |pnet(?:_| )|windows )'
          if ($nativeDependencies) {
            $nativeDependencies | ForEach-Object { Write-Error $_ }
            throw 'portable Windows profiles must not resolve pnet, libloading, or the Windows native adapter'
          }
      - name: Assert the native Windows dependency boundary
        if: runner.os == 'Windows' && matrix.flags == '--all-features'
        shell: pwsh
        run: |
          $tree = cargo tree --color never --locked --target x86_64-pc-windows-msvc --edges normal --all-features --prefix none --format '{p}'
          $packetLibraryBoundary = $tree | Select-String -Pattern '^(?:pcap |pnet(?:_| ))'
          if ($packetLibraryBoundary) {
            $packetLibraryBoundary | ForEach-Object { Write-Error $_ }
            throw 'Windows native adapters must not statically link pcap, pnet, or Packet.lib'
          }
          $windowsBindings = $tree | Select-String -Pattern '^windows '
          if (-not $windowsBindings) {
            throw 'the Windows all-feature profile must resolve the native IP Helper bindings'
          }
          $runtimeLoader = $tree | Select-String -Pattern '^libloading '
          if (-not $runtimeLoader) {
            throw 'the Windows all-feature profile must resolve the Npcap runtime loader'
          }

  required:
    name: Required checks
    if: always()
    needs:
      - format
      - linux-feature-matrix
      - package
      - portable-platforms
      - schemas
      - dependency-policy
      - architecture-policy
      - rustsec
      - fixtures
    runs-on: ubuntu-24.04
    steps:
      - name: Confirm all required jobs passed
        run: |
          test "${{ needs.format.result }}" = "success"
          test "${{ needs.linux-feature-matrix.result }}" = "success"
          test "${{ needs.package.result }}" = "success"
          test "${{ needs.portable-platforms.result }}" = "success"
          test "${{ needs.schemas.result }}" = "success"
          test "${{ needs.dependency-policy.result }}" = "success"
          test "${{ needs.architecture-policy.result }}" = "success"
          test "${{ needs.rustsec.result }}" = "success"
          test "${{ needs.fixtures.result }}" = "success"
