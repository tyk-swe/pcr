version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    # The nested fuzz package is scanned by the separate block below.
    exclude-paths:
      - "fuzz/**"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    allow:
      - dependency-type: all
    groups:
      cargo-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: "/fuzz"
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    groups:
      fuzz-minor-and-patch:
        update-types:
          - minor
          - patch
